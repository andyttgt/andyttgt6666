<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉翊聿｜個人品牌頁</title> 

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI','Noto Sans TC';
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:center;
    gap:30px;
    padding:15px;
    backdrop-filter:blur(12px);
    background:rgba(0,0,0,0.4);
    z-index:999;
}

nav a{
    color:#cbd5e1;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:#fbbf24;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#f59e0b;
    filter:blur(120px);
    opacity:.3;
}

.hero h1{
    font-size:3.5rem;
}

.hero span{
    color:#fbbf24;
}

.hero p{
    margin:15px 0;
    opacity:.8;
}

.btn{
    padding:12px 28px;
    background:#f59e0b;
    border-radius:30px;
    text-decoration:none;
    color:#0f172a;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* SECTION */
.section{
    padding:100px 20px;
    text-align:center;
}

/* 卡片區 */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    transition:.3s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    opacity:.8;
    margin-bottom:20px;
}

.link-btn{
    display:inline-block;
    padding:10px 20px;
    border-radius:20px;
    background:#334155;
    color:white;
    text-decoration:none;
    transition:.3s;
}

.link-btn:hover{
    background:#f59e0b;
    color:#0f172a;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    background:#020617;
    color:#94a3b8;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#home">首頁</a>
    <a href="#section">內容</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <div>
        <h1>吉翊聿<span>.</span></h1>
        <p>Backend Developer in Progress</p>
    </div>
</section>

<!-- 卡片區 -->
<section class="section" id="section">
    <h2 style="margin-bottom:50px;">我的探索</h2>

    <div class="cards">

        <div class="card">
            <h3>📊 何倫碼</h3>
            <p>R 職涯人格分析</p>
            <!-- 修改完成：將原本 andy.html 改為 RSC.html -->
            <a href="andy.html" class="link-btn">查看</a>
        </div>

        <div class="card">
            <h3>💼 職務規劃</h3>
            <p>資訊工程師 
          </p>
            <a href="andyttgt.html" class="link-btn">探索</a>
        </div>

        <div class="card">
            <h3>📄 關於我</h3>
            <p>資管系學生，往程式設計方向邁進</p>
            <a href="andyttg6666.html" class="link-btn">更多</a>
        </div>

    </div>
</section>

<footer>
© 2025 吉翊聿｜Portfolio  
</footer>

</body>
</html>
